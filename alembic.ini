# Alembic — uso via CLI (ex.: alembic upgrade head, alembic revision --autogenerate).
# Em runtime o app não lê este arquivo: init_db() configura o Alembic por código.
# A URL do banco vem de backend.core.database.DATABASE_URL (env DATABASE_URL /
# SUPERFRIO_DB_PATH) — não hardcode aqui.

[alembic]
script_location = backend/core/migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
